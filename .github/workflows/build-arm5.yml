name: Build ARM5 Server

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up toolchain
      run: |
        tar -xzf toolchain/crosstoll-ng-1.2.00-arm-926ejs-linux-gnueabi.tar.gz -C toolchain
        echo "$GITHUB_WORKSPACE/toolchain/arm-926ejs-linux-gnueabi/bin" >> $GITHUB_PATH

    - name: Compile l2tcp_server
      run: |
        cd l2tcp_server
        arm-926ejs-linux-gnueabi-gcc -std=gnu99 -march=armv5te -I../hal -static -o l2tcp_server l2tcp_server_main.c ../hal/smc.c ../hal/l2trig_hal.c

    - name: Compile l2trig_direct_client
      run: |
        cd hal
        arm-926ejs-linux-gnueabi-gcc -std=gnu99 -march=armv5te -I. -static -o l2trig_direct_client l2trig_direct_client.c smc.c l2trig_hal.c l2trig_hal_exports.c

    - name: Verify binaries
      run: |
        file l2tcp_server/l2tcp_server
        file hal/l2trig_direct_client

    - name: Upload artifacts
      uses: actions/upload-artifact@v7
      with:
        name: nectarcam-l2trig-arm5
        path: |
          l2tcp_server/l2tcp_server
          hal/l2trig_direct_client

    - name: Release
      uses: softprops/action-gh-release@v3
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: |
          l2tcp_server/l2tcp_server
          hal/l2trig_direct_client
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
